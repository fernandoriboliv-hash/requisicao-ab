<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Cozinha - Rosewood SP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{color:#c9a96e;font-size:22px;font-weight:600;letter-spacing:1px}
.logo p{color:#666;font-size:13px;margin-top:4px}
label{display:block;color:#999;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:20px}
input{width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s}
input:focus{border-color:#c9a96e}
button{width:100%;margin-top:28px;background:#c9a96e;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;padding:14px;cursor:pointer;transition:background .2s}
button:hover{background:#e0c080}
button:disabled{background:#555;cursor:not-allowed;color:#888}
.erro{background:#2a1515;border:1px solid #5a2020;border-radius:8px;color:#ff6b6b;font-size:13px;margin-top:16px;padding:10px 14px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>ROSEWOOD SP</h1><p>Sistema de Gestao de Cozinha A&B</p></div>
  <label for="email">E-mail</label>
  <input id="email" type="email" placeholder="usuario@rosewood" autocomplete="username">
  <label for="senha">Senha</label>
  <input id="senha" type="password" placeholder="senha" autocomplete="current-password">
  <div class="erro" id="erro"></div>
  <button id="btnLogin" onclick="fazerLogin()">Entrar</button>
</div>
<script>
const SURL='https://nyijprhukndlyijqljbm.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55aWpwcmh1a25kbHlpanFsamJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjUwMDgsImV4cCI6MjA5MjIwMTAwOH0.Vzljd9xesi1ZJ-l7du00v-elUSDQObRCUz2jPyqL5p8';
const sb=supabase.createClient(SURL,SKEY);
document.getElementById('senha').addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin()});
async function fazerLogin(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btnLogin');
  document.getElementById('erro').style.display='none';
  if(!email||!senha){mostrarErro('Preencha e-mail e senha.');return}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const{data:u,error}=await sb.from('usuarios').select('*').eq('email',email).eq('ativo',true).single();
    if(error||!u){mostrarErro('Usuario nao encontrado ou inativo.');btn.disabled=false;btn.textContent='Entrar';return}
    const h=await sha256(senha);
    if(u.senha_hash!==h&&u.senha_hash!==senha){mostrarErro('Senha incorreta.');btn.disabled=false;btn.textContent='Entrar';return}
    sessionStorage.setItem('rw_user',JSON.stringify({id:u.id,nome:u.nome,email:u.email,perfil:u.perfil,subtipo:u.subtipo||null,pdv:u.pdv||null}));
    if(u.perfil==='master')location.href='master.html';
    else if(u.perfil==='executivo')location.href='executivo.html';
    else if(u.perfil==='operacional'&&u.subtipo==='estoque')location.href='contagem.html';
    else if(u.perfil==='operacional'&&u.subtipo==='pdv')location.href='requisicao.html';
    else{mostrarErro('Perfil nao reconhecido.');btn.disabled=false;btn.textContent='Entrar'}
  }catch(e){mostrarErro('Erro de conexao.');btn.disabled=false;btn.textContent='Entrar'}
}
function mostrarErro(m){const el=document.getElementById('erro');el.textContent=m;el.style.display='block'}
async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
</script>
</body>
</html>
