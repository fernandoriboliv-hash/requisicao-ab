<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contagem - Rosewood SP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#e0e0e0}
.topbar{background:#141414;border-bottom:1px solid #222;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar h1{color:#c9a96e;font-size:16px;font-weight:600}
.ml-auto{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn-logout{background:none;border:1px solid #333;color:#666;font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer}
.btn-logout:hover{color:#aaa}
.progress-bar-wrap{background:#141414;border-bottom:1px solid #222;padding:12px 24px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px}
.progress-bar{height:6px;background:#222;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#e0c080);border-radius:3px;transition:width .4s}
.container{max-width:960px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#141414;border:1px solid #222;border-radius:10px;padding:4px}
.tab{flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;transition:all .15s}
.tab.active{background:#c9a96e;color:#000;font-weight:700}
.tab:hover:not(.active){background:#1e1e1e;color:#aaa}
.pane{display:none}.pane.active{display:block}
.area-section{margin-bottom:20px}
.area-header{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px 10px 0 0;padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.area-header h3{color:#c9a96e;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.area-prog{margin-left:auto;font-size:12px;color:#666}
.area-body{background:#161616;border:1px solid #2a2a2a;border-top:none;border-radius:0 0 10px 10px}
.secao-label{background:#141414;padding:8px 20px;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1e1e1e}
.item-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid #1e1e1e;transition:background .1s}
.item-row:last-child{border-bottom:none}
.item-row:hover{background:#1a1a1a}
.item-check{width:22px;height:22px;border-radius:50%;border:2px solid #333;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .2s}
.item-check.checked{border-color:#2ecc71;background:#2ecc71;color:#000}
.item-nome{flex:1;font-size:13px;color:#ddd}
.item-nota{font-size:11px;color:#555;margin-top:2px}
.item-un{font-size:12px;color:#666;width:80px;text-align:right}
.item-input{width:90px;background:#111;border:1px solid #2a2a2a;border-radius:6px;color:#fff;font-size:14px;padding:7px 10px;text-align:center;outline:none;transition:border-color .2s}
.item-input:focus{border-color:#c9a96e}
.item-input.filled{border-color:#2ecc71;background:#0f2a1a}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#c9a96e;color:#000}.btn-primary:hover{background:#e0c080}
.btn-ghost{background:none;border:1px solid #333;color:#888}.btn-ghost:hover{background:#1e1e1e;color:#ccc}
.btn-sm{padding:6px 12px;font-size:12px}
.search-box{background:#1a1a1a;border:1px solid #252525;border-radius:10px;padding:20px;margin-bottom:16px}
.search-box label{display:block;color:#777;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.search-box input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:7px;color:#fff;font-size:14px;padding:10px 14px;outline:none}
.search-box input:focus{border-color:#c9a96e}
table{width:100%;border-collapse:collapse}
th{background:#161616;color:#666;font-size:11px;text-transform:uppercase;padding:10px 16px;text-align:left}
td{padding:11px 16px;border-top:1px solid #1e1e1e;font-size:13px;color:#ccc}
tr:hover td{background:#1a1a1a}
.empty{text-align:center;padding:40px;color:#555;font-size:14px}
.card{background:#1a1a1a;border:1px solid #252525;border-radius:10px;padding:20px;margin-bottom:16px}
.btn-fixed{position:fixed;bottom:24px;right:24px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:50}
</style>
</head>
<body>
<div class="topbar">
  <h1>🍽 ROSEWOOD SP — Contagem de Estoque</h1>
  <div class="ml-auto">
    <span style="color:#666;font-size:12px" id="user-nome">-</span>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-label"><span id="prog-label">Progresso do checklist</span><span id="prog-pct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="showTab('checklist',this)">📋 Checklist Diario</div>
    <div class="tab" onclick="showTab('historico',this)">📈 Historico de Variacao</div>
    <div class="tab" onclick="showTab('busca',this)">🔍 Busca por PDV</div>
  </div>
  <div class="pane active" id="pane-checklist"><div id="checklist-container"><div class="empty">Carregando checklist...</div></div></div>
  <div class="pane" id="pane-historico">
    <div class="search-box"><label>Filtrar item</label><input type="text" id="hist-busca" placeholder="Ex: Laranja pera..." oninput="filtrarHistorico(this.value)"></div>
    <div class="card"><div id="historico-body"><div class="empty">Carregando...</div></div></div>
  </div>
  <div class="pane" id="pane-busca">
    <div class="search-box">
      <label>Buscar ingrediente requisitado</label>
      <input type="text" id="busca-pdv" placeholder="Ex: Tomate cereja..." oninput="buscarPorIngrediente(this.value)">
      <div style="margin-top:10px"><label>Data de consulta</label><input type="date" id="busca-data" style="background:#111;border:1px solid #2a2a2a;border-radius:7px;color:#fff;font-size:14px;padding:8px 12px;margin-top:6px;outline:none;width:100%"></div>
    </div>
    <div class="card" id="busca-resultado"><div class="empty">Digite um ingrediente para buscar.</div></div>
  </div>
</div>
<button class="btn btn-primary btn-fixed" onclick="confirmarContagem()">✅ Confirmar Contagem</button>
<script src="contagem.js"></script>
</body>
</html>
