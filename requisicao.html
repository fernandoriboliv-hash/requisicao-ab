<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requisição — Rosewood A&B</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #B8963E; --gold-light: #D4AF6A;
    --dark: #0F1117; --surface: #161B27; --panel: #1D2333;
    --border: rgba(184,150,62,0.2); --border-subtle: rgba(255,255,255,0.07);
    --text: #E8E4DC; --muted: #7A8094; --muted2: #4A5066;
    --green: #4CAF7D; --orange: #E08C3E; --error: #E05252;
    --proteina: #5B8DD9; --laticinios: #9B6DD9; --hortifruti: #4CAF7D;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center;
    justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .hotel-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 400; letter-spacing: 2px; color: var(--gold);
  }
  .divider-v { width: 1px; height: 20px; background: var(--border); }
  .page-title { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .user-badge {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .pdv-chip {
    background: rgba(184,150,62,0.15); border: 1px solid var(--border);
    color: var(--gold); font-size: 11px; letter-spacing: 1px;
    padding: 3px 10px; text-transform: uppercase;
  }
  .logout-btn {
    background: none; border: none; color: var(--muted);
    font-size: 12px; cursor: pointer; padding: 4px 8px;
    transition: color 0.2s;
  }
  .logout-btn:hover { color: var(--text); }

  /* AVISO DE HORÁRIO */
  .aviso-horario {
    margin: 16px 24px 0;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .aviso-horario.hoje {
    background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3);
    color: var(--green);
  }
  .aviso-horario.amanha {
    background: rgba(224,140,62,0.1); border: 1px solid rgba(224,140,62,0.3);
    color: var(--orange);
  }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 24px; }

  /* TABS DE CATEGORIA */
  .cats { display: flex; gap: 8px; margin-bottom: 24px; }
  .cat-btn {
    flex: 1; padding: 14px 8px;
    background: var(--surface); border: 1px solid var(--border-subtle);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .cat-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px; vertical-align: middle;
  }
  .cat-btn.active-proteina { background: rgba(91,141,217,0.15); border-color: var(--proteina); color: var(--proteina); }
  .cat-btn.active-laticinios { background: rgba(155,109,217,0.15); border-color: var(--laticinios); color: var(--laticinios); }
  .cat-btn.active-hortifruti { background: rgba(76,175,125,0.15); border-color: var(--hortifruti); color: var(--hortifruti); }

  /* BUSCA */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted2); }
  #searchInput {
    width: 100%; background: var(--panel); border: 1px solid var(--border-subtle);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 12px 16px 12px 42px; outline: none; transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: rgba(184,150,62,0.4); }

  /* ITENS */
  .items-grid { display: flex; flex-direction: column; gap: 2px; }
  .item-row {
    display: flex; align-items: center;
    background: var(--panel); padding: 12px 16px;
    border: 1px solid transparent; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; gap: 12px;
  }
  .item-row:hover { border-color: var(--border-subtle); }
  .item-row.selected { border-color: var(--gold); background: rgba(184,150,62,0.08); }
  .item-row.selected-proteina { border-color: var(--proteina); background: rgba(91,141,217,0.08); }
  .item-row.selected-laticinios { border-color: var(--laticinios); background: rgba(155,109,217,0.08); }
  .item-row.selected-hortifruti { border-color: var(--hortifruti); background: rgba(76,175,125,0.08); }
  .item-check {
    width: 18px; height: 18px; border: 1px solid var(--muted2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .item-row.selected .item-check,
  .item-row.selected-proteina .item-check,
  .item-row.selected-laticinios .item-check,
  .item-row.selected-hortifruti .item-check {
    background: var(--gold); border-color: var(--gold);
  }
  .item-name { flex: 1; font-size: 14px; }
  .item-unit { font-size: 12px; color: var(--muted); }
  .qty-control {
    display: none; align-items: center; gap: 8px;
  }
  .item-row.selected .qty-control,
  .item-row.selected-proteina .qty-control,
  .item-row.selected-laticinios .qty-control,
  .item-row.selected-hortifruti .qty-control { display: flex; }
  .qty-btn {
    width: 28px; height: 28px; background: rgba(255,255,255,0.08);
    border: none; color: var(--text); font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: rgba(255,255,255,0.15); }
  .qty-input {
    width: 56px; text-align: center; background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-subtle); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 4px; outline: none;
  }
  .qty-input:focus { border-color: rgba(184,150,62,0.4); }

  /* ITEM LIVRE */
  .item-livre-section {
    margin-top: 24px; padding: 20px;
    background: var(--panel); border: 1px dashed var(--border-subtle);
  }
  .item-livre-title {
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .item-livre-row { display: flex; gap: 8px; }
  .input-livre {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 14px; outline: none; transition: border-color 0.2s;
  }
  .input-livre:focus { border-color: rgba(184,150,62,0.4); }
  .btn-add-livre {
    padding: 10px 16px; background: rgba(184,150,62,0.15);
    border: 1px solid var(--border); color: var(--gold);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .btn-add-livre:hover { background: rgba(184,150,62,0.25); }
  .itens-livres-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .item-livre-chip {
    display: flex; align-items: center; gap: 8px;
    background: rgba(224,140,62,0.1); border: 1px solid rgba(224,140,62,0.3);
    padding: 8px 12px; font-size: 13px; color: var(--orange);
  }
  .item-livre-chip .remove { cursor: pointer; opacity: 0.6; margin-left: auto; }
  .item-livre-chip .remove:hover { opacity: 1; }

  /* OBSERVAÇÃO */
  .obs-section { margin-top: 16px; }
  .obs-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
  textarea {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 12px 14px; outline: none; resize: vertical; min-height: 80px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(184,150,62,0.4); }

  /* CARRINHO FLUTUANTE */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 16px 24px; display: none;
    justify-content: space-between; align-items: center; z-index: 200;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .cart-bar.visible { display: flex; }
  .cart-info { font-size: 13px; color: var(--muted); }
  .cart-count { font-size: 22px; font-weight: 500; color: var(--text); margin-right: 8px; }
  .btn-enviar {
    background: var(--gold); color: #0F1117;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
    border: none; padding: 14px 32px; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-enviar:hover { background: var(--gold-light); }
  .btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MODAL CONFIRMAÇÃO */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 300;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    width: 500px; max-width: 95vw; max-height: 80vh;
    overflow-y: auto; animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    padding: 24px 28px 16px; border-bottom: 1px solid var(--border-subtle);
    font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 1px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 20px 28px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .modal-item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border-subtle); font-size: 14px;
  }
  .modal-item-row:last-child { border-bottom: none; }
  .modal-item-qty { color: var(--gold); font-weight: 500; }
  .modal-livre-row {
    padding: 6px 0; font-size: 13px; color: var(--orange);
    border-bottom: 1px solid var(--border-subtle);
  }
  .modal-meta { font-size: 12px; color: var(--muted); margin-top: 12px; }
  .modal-footer { padding: 16px 28px 24px; display: flex; gap: 8px; }
  .btn-cancel {
    flex: 1; background: none; border: 1px solid var(--border-subtle);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 12px; cursor: pointer; transition: border-color 0.2s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  .btn-confirmar {
    flex: 2; background: var(--gold); color: #0F1117;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
    border: none; padding: 12px; cursor: pointer; transition: background 0.2s;
  }
  .btn-confirmar:hover { background: var(--gold-light); }
  .btn-confirmar:disabled { opacity: 0.5; cursor: not-allowed; }

  /* SUCESSO */
  .success-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center; z-index: 400;
    flex-direction: column; gap: 16px; text-align: center;
  }
  .success-overlay.open { display: flex; }
  .success-icon { font-size: 56px; }
  .success-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--gold); }
  .success-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .success-num { font-size: 36px; font-weight: 300; color: var(--text); margin-top: 8px; }
  .btn-nova {
    margin-top: 24px; background: none; border: 1px solid var(--border);
    color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase; padding: 14px 32px;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-nova:hover { background: rgba(184,150,62,0.1); }

  /* HISTÓRICO */
  .hist-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-subtle); padding-bottom: 100px; }
  .hist-title { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
  .hist-card {
    background: var(--panel); border: 1px solid var(--border-subtle);
    padding: 16px; margin-bottom: 8px;
  }
  .hist-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .hist-num { font-size: 12px; color: var(--muted); }
  .hist-date { font-size: 12px; color: var(--muted); }
  .status-badge {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; font-weight: 500;
  }
  .status-enviado { background: rgba(122,128,148,0.15); color: var(--muted); }
  .status-separacao { background: rgba(224,140,62,0.15); color: var(--orange); }
  .status-entregue { background: rgba(76,175,125,0.15); color: var(--green); }
  .hist-items { font-size: 13px; color: var(--muted); }
  .hist-items span { color: var(--text); }
  .hist-div { margin-top: 8px; padding: 6px 10px; background: rgba(224,82,82,0.1); border-left: 2px solid var(--error); font-size: 12px; color: #E08888; }

  .loading-text { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
  .empty-text { text-align: center; color: var(--muted2); padding: 40px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="hotel-mark">Rosewood</div>
    <div class="divider-v"></div>
    <div class="page-title">Requisição</div>
  </div>
  <div class="user-badge">
    <span class="pdv-chip" id="pdvChip">—</span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</header>

<div id="avisoHorario" class="aviso-horario hoje">
  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  <span id="avisoTxt"></span>
</div>

<main>
  <!-- CATEGORIAS -->
  <div class="cats">
    <button class="cat-btn active-proteina" onclick="selectCat('proteina', this)">
      <span class="dot" style="background:var(--proteina)"></span>Proteína
    </button>
    <button class="cat-btn" onclick="selectCat('laticinios', this)">
      <span class="dot" style="background:var(--laticinios)"></span>Laticínios
    </button>
    <button class="cat-btn" onclick="selectCat('hortifruti', this)">
      <span class="dot" style="background:var(--hortifruti)"></span>Hortifruti
    </button>
  </div>

  <!-- BUSCA -->
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar item..." oninput="renderItems()">
  </div>

  <!-- LISTA DE ITENS -->
  <div class="items-grid" id="itemsGrid">
    <div class="loading-text">Carregando catálogo...</div>
  </div>

  <!-- ITEM LIVRE -->
  <div class="item-livre-section">
    <div class="item-livre-title">⚠ Item não encontrado no catálogo</div>
    <div class="item-livre-row">
      <input class="input-livre" id="itemLivreNome" placeholder="Nome do item">
      <input class="input-livre" id="itemLivreQtd" placeholder="Qtd" style="width:80px;flex:none">
      <input class="input-livre" id="itemLivreUnid" placeholder="Un." style="width:60px;flex:none">
      <button class="btn-add-livre" onclick="addItemLivre()">+ Adicionar</button>
    </div>
    <div class="itens-livres-list" id="itensLivresList"></div>
  </div>

  <!-- OBSERVAÇÃO -->
  <div class="obs-section">
    <label class="obs-label">Observação (opcional)</label>
    <textarea id="obsInput" placeholder="Alguma observação sobre este pedido..."></textarea>
  </div>

  <!-- HISTÓRICO -->
  <div class="hist-section">
    <div class="hist-title">Histórico de Requisições</div>
    <div id="histContainer"><div class="loading-text">Carregando histórico...</div></div>
  </div>
</main>

<!-- CART BAR -->
<div class="cart-bar" id="cartBar">
  <div class="cart-info"><span class="cart-count" id="cartCount">0</span> iten(s) selecionado(s)</div>
  <button class="btn-enviar" onclick="abrirModal()">Revisar e Enviar</button>
</div>

<!-- MODAL REVISÃO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span>Revisar Requisição</span>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
      <button class="btn-confirmar" id="btnConfirmar" onclick="enviarRequisicao()">Confirmar Envio</button>
    </div>
  </div>
</div>

<!-- SUCESSO -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✓</div>
  <div class="success-title">Requisição Enviada</div>
  <div class="success-num" id="successNum"></div>
  <div class="success-sub" id="successSub"></div>
  <button class="btn-nova" onclick="novoPedido()">Nova Requisição</button>
</div>

<script>
const SUPABASE_URL = 'https://nyijprhukndlyijqljbm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55aWpwcmh1a25kbHlpanFsamJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjUwMDgsImV4cCI6MjA5MjIwMTAwOH0.Vzljd9xesi1ZJ-l7du00v-elUSDQObRCUz2jPyqL5p8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentPerfil = null;
let catalogoCompleto = [];
let catAtual = 'proteina';
let selecionados = {}; // { item_id: { item, qty } }
let itensLivres = []; // { nome, qtd, unidade }

// INIT
window.addEventListener('load', async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;

  const { data: perfil } = await sb.from('usuarios').select('*').eq('auth_uid', user.id).single();
  if (!perfil || perfil.perfil !== 'pdv') { window.location.href = 'index.html'; return; }
  currentPerfil = perfil;

  // PDV name
  const { data: pdvData } = await sb.from('pdvs').select('nome').eq('id', perfil.pdv_id).single();
  document.getElementById('pdvChip').textContent = pdvData?.nome || 'PDV';

  verificarHorario();
  await carregarCatalogo();
  await carregarHistorico();
  selectCat('proteina', document.querySelector('.cat-btn'));
});

function verificarHorario() {
  const agora = new Date();
  const corte = new Date(); corte.setHours(10, 0, 0, 0);
  const aviso = document.getElementById('avisoHorario');
  const txt = document.getElementById('avisoTxt');
  if (agora < corte) {
    aviso.className = 'aviso-horario hoje';
    txt.textContent = `Pedidos enviados até as 10h00 entram no dia de hoje. Restam ${formatTime(corte - agora)}.`;
  } else {
    aviso.className = 'aviso-horario amanha';
    txt.textContent = 'Passadas as 10h00 — este pedido será incluído na lista de amanhã.';
  }
}

function formatTime(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}h${String(m).padStart(2,'0')}min`;
}

async function carregarCatalogo() {
  const { data } = await sb.from('itens').select('*').eq('ativo', true).order('nome');
  catalogoCompleto = data || [];
}

function selectCat(cat, btn) {
  catAtual = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.className = 'cat-btn';
  });
  btn.className = `cat-btn active-${cat}`;
  document.getElementById('searchInput').value = '';
  renderItems();
}

function renderItems() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const itens = catalogoCompleto.filter(i => i.categoria === catAtual && (!q || i.nome.toLowerCase().includes(q)));
  const grid = document.getElementById('itemsGrid');

  if (itens.length === 0) {
    grid.innerHTML = '<div class="empty-text">Nenhum item encontrado nesta categoria.</div>';
    return;
  }

  grid.innerHTML = itens.map(item => {
    const sel = selecionados[item.id];
    const cls = sel ? `item-row selected-${catAtual}` : 'item-row';
    const qty = sel ? sel.qty : 1;
    return `
      <div class="${cls}" id="row-${item.id}" onclick="toggleItem('${item.id}')">
        <div class="item-check">${sel ? '✓' : ''}</div>
        <div class="item-name">${item.nome}</div>
        <div class="item-unit">${item.unidade}</div>
        <div class="qty-control" onclick="event.stopPropagation()">
          <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
          <input class="qty-input" type="number" value="${qty}" min="0.1" step="0.1"
            onchange="setQty('${item.id}', this.value)" onclick="this.select()">
          <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
        </div>
      </div>`;
  }).join('');
}

function toggleItem(id) {
  const item = catalogoCompleto.find(i => i.id === id);
  if (!item) return;
  if (selecionados[id]) { delete selecionados[id]; }
  else { selecionados[id] = { item, qty: 1 }; }
  renderItems();
  updateCart();
}

function changeQty(id, delta) {
  if (!selecionados[id]) return;
  const novaQty = Math.max(0.1, (selecionados[id].qty || 1) + delta);
  selecionados[id].qty = Math.round(novaQty * 10) / 10;
  renderItems();
}

function setQty(id, val) {
  if (!selecionados[id]) return;
  const v = parseFloat(val);
  selecionados[id].qty = isNaN(v) || v <= 0 ? 1 : v;
}

function addItemLivre() {
  const nome = document.getElementById('itemLivreNome').value.trim();
  const qtd = document.getElementById('itemLivreQtd').value.trim();
  const unid = document.getElementById('itemLivreUnid').value.trim() || 'un';
  if (!nome || !qtd) { alert('Informe o nome e a quantidade do item.'); return; }
  itensLivres.push({ nome, qtd, unidade: unid });
  document.getElementById('itemLivreNome').value = '';
  document.getElementById('itemLivreQtd').value = '';
  document.getElementById('itemLivreUnid').value = '';
  renderItensLivres();
  updateCart();
}

function renderItensLivres() {
  const list = document.getElementById('itensLivresList');
  list.innerHTML = itensLivres.map((it, i) => `
    <div class="item-livre-chip">
      <span>⚠ ${it.nome} — ${it.qtd} ${it.unidade}</span>
      <span class="remove" onclick="removeItemLivre(${i})">✕</span>
    </div>`).join('');
}

function removeItemLivre(i) {
  itensLivres.splice(i, 1);
  renderItensLivres();
  updateCart();
}

function updateCart() {
  const total = Object.keys(selecionados).length + itensLivres.length;
  document.getElementById('cartCount').textContent = total;
  document.getElementById('cartBar').className = total > 0 ? 'cart-bar visible' : 'cart-bar';
}

function abrirModal() {
  const body = document.getElementById('modalBody');
  const agora = new Date();
  const corte = new Date(); corte.setHours(10, 0, 0, 0);
  const competencia = agora >= corte ? 'Amanhã' : 'Hoje';
  const obs = document.getElementById('obsInput').value.trim();

  // Agrupar por categoria
  const porCat = { proteina: [], laticinios: [], hortifruti: [] };
  Object.values(selecionados).forEach(({ item, qty }) => { porCat[item.categoria]?.push({ item, qty }); });

  const catLabels = { proteina: 'Proteínas', laticinios: 'Laticínios', hortifruti: 'Hortifruti' };

  let html = '';
  for (const [cat, items] of Object.entries(porCat)) {
    if (items.length === 0) continue;
    html += `<div class="modal-section">
      <div class="modal-section-title">${catLabels[cat]}</div>
      ${items.map(({ item, qty }) => `
        <div class="modal-item-row">
          <span>${item.nome}</span>
          <span class="modal-item-qty">${qty} ${item.unidade}</span>
        </div>`).join('')}
    </div>`;
  }

  if (itensLivres.length > 0) {
    html += `<div class="modal-section">
      <div class="modal-section-title">⚠ Itens para Revisão pelo Master</div>
      ${itensLivres.map(it => `<div class="modal-livre-row">${it.nome} — ${it.qtd} ${it.unidade}</div>`).join('')}
    </div>`;
  }

  if (obs) html += `<div class="modal-section"><div class="modal-section-title">Observação</div><div style="font-size:13px;color:var(--muted)">${obs}</div></div>`;

  html += `<div class="modal-meta">📅 Esta requisição será incluída na lista de <strong style="color:var(--text)">${competencia}</strong>.</div>`;

  body.innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function fecharModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function enviarRequisicao() {
  const btn = document.getElementById('btnConfirmar');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const agora = new Date();
  const corte = new Date(); corte.setHours(10, 0, 0, 0);
  const dataComp = new Date();
  if (agora >= corte) dataComp.setDate(dataComp.getDate() + 1);
  const dataCompISO = dataComp.toISOString().split('T')[0];

  const obs = document.getElementById('obsInput').value.trim();

  // Criar requisição
  const { data: req, error: reqErr } = await sb.from('requisicoes').insert({
    pdv_id: currentPerfil.pdv_id,
    usuario_id: currentPerfil.id,
    status: 'enviado',
    data_competencia: dataCompISO,
    observacao: obs || null
  }).select().single();

  if (reqErr) { alert('Erro ao enviar: ' + reqErr.message); btn.disabled = false; btn.textContent = 'Confirmar Envio'; return; }

  // Inserir itens do catálogo
  const itensCatalogo = Object.values(selecionados).map(({ item, qty }) => ({
    requisicao_id: req.id,
    item_id: item.id,
    item_nome: item.nome,
    item_categoria: item.categoria,
    item_unidade: item.unidade,
    quantidade_solicitada: qty,
    item_livre: false
  }));

  // Inserir itens livres
  const itensLivresInsert = itensLivres.map(it => ({
    requisicao_id: req.id,
    item_id: null,
    item_nome: it.nome,
    item_categoria: catAtual,
    item_unidade: it.unidade,
    quantidade_solicitada: parseFloat(it.qtd),
    item_livre: true
  }));

  const todosItens = [...itensCatalogo, ...itensLivresInsert];
  if (todosItens.length > 0) {
    const { error: itErr } = await sb.from('requisicao_itens').insert(todosItens);
    if (itErr) { alert('Erro ao inserir itens: ' + itErr.message); btn.disabled = false; btn.textContent = 'Confirmar Envio'; return; }
  }

  // Itens livres para revisão do master
  const paraRevisao = itensLivres.map(it => ({
    requisicao_id: req.id,
    pdv_id: currentPerfil.pdv_id,
    nome_digitado: it.nome,
    status: 'pendente'
  }));
  if (paraRevisao.length > 0) await sb.from('itens_pendentes').insert(paraRevisao);

  fecharModal();

  // Sucesso
  const numStr = `#${String(req.id).padStart(5,'0')}`;
  document.getElementById('successNum').textContent = numStr;
  document.getElementById('successSub').textContent =
    agora >= corte ? 'Incluída na lista de amanhã.' : 'Incluída na lista de hoje.';
  document.getElementById('successOverlay').classList.add('open');

  btn.disabled = false; btn.textContent = 'Confirmar Envio';
  await carregarHistorico();
}

function novoPedido() {
  selecionados = {};
  itensLivres = [];
  document.getElementById('obsInput').value = '';
  document.getElementById('successOverlay').classList.remove('open');
  renderItems();
  renderItensLivres();
  updateCart();
  verificarHorario();
}

async function carregarHistorico() {
  const cont = document.getElementById('histContainer');
  const { data: reqs } = await sb.from('requisicoes')
    .select('*, pdvs(nome), requisicao_itens(*)')
    .eq('pdv_id', currentPerfil.pdv_id)
    .order('created_at', { ascending: false })
    .limit(20);

  if (!reqs || reqs.length === 0) {
    cont.innerHTML = '<div class="empty-text">Nenhuma requisição encontrada.</div>';
    return;
  }

  cont.innerHTML = reqs.map(r => {
    const data = new Date(r.created_at).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    const itens = r.requisicao_itens || [];
    const resumo = itens.slice(0, 3).map(i => `<span>${i.item_nome} (${i.quantidade_solicitada}${i.item_unidade ? ' ' + i.item_unidade : ''})</span>`).join(', ');
    const mais = itens.length > 3 ? ` +${itens.length - 3} itens` : '';
    const divs = itens.filter(i => i.divergencia);

    return `<div class="hist-card">
      <div class="hist-card-head">
        <span class="hist-num">#${String(r.id).padStart(5,'0')} · <span class="hist-date">${data}</span></span>
        <span class="status-badge status-${r.status}">${{ enviado:'Enviado', separacao:'Em Separação', entregue:'Entregue' }[r.status] || r.status}</span>
      </div>
      <div class="hist-items">${resumo}${mais ? `<span style="color:var(--muted)"> ${mais}</span>` : ''}</div>
      ${r.observacao ? `<div style="font-size:12px;color:var(--muted);margin-top:6px">💬 ${r.observacao}</div>` : ''}
      ${divs.length > 0 ? `<div class="hist-div">⚠ ${divs.length} item(s) com divergência na entrega</div>` : ''}
    </div>`;
  }).join('');
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
</script>
